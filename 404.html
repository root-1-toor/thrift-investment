<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Page Not Found | Thrift Investment</title>
  <link rel="stylesheet" href="fonts/fonts.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0d1f35;
      --gold: #c8982a;
      --gold2: #e6b84a;
      --cream: #f5f0e8;
      --white: #ffffff;
      --gray: #6b7a8d;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 40px 24px;
      position: relative;
      z-index: 2;
      opacity: 0;
      animation: fadeUp .7s .1s forwards;
    }

    .big-num {
      font-family: 'Playfair Display', serif;
      font-size: clamp(8rem, 20vw, 16rem);
      font-weight: 900;
      color: rgba(200,152,42,.12);
      line-height: 1;
      margin-bottom: -20px;
      display: block;
    }

    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 700;
      color: var(--white);
      margin-bottom: 16px;
      line-height: 1.2;
    }

    p {
      font-size: 1rem;
      color: rgba(255,255,255,.5);
      font-weight: 300;
      margin-bottom: 40px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.7;
    }

    .btn {
      display: inline-block;
      background: var(--gold);
      color: var(--navy);
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 14px 32px;
      transition: background .2s, transform .2s;
    }

    .btn:hover {
      background: var(--gold2);
      transform: translateY(-2px);
    }

    /* background grid lines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        90deg,
        rgba(200,152,42,.03) 0px,
        rgba(200,152,42,.03) 1px,
        transparent 1px,
        transparent 80px
      );
      pointer-events: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="big-num">404</span>
    <p class="eyebrow">Page Not Found</p>
    <h1>This page doesn't exist.</h1>
    <p>The page you're looking for may have moved or been removed. Head back home and we'll get you where you need to go.</p>
    <a href="/" class="btn">Back to Home</a>
  </div>
</body>
</html>
